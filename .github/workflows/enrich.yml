name: Enrich Existing Articles

on:
  workflow_dispatch:

jobs:
  enrich:
    name: Add TLDR and FAQs to existing articles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger enrich endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SITE_URL or CRON_SECRET not configured"
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/enrich")

          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "Response code: $CODE"
          echo "Response body: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "Enrich failed with status $CODE"
            exit 1
          fi

          echo "Enrich batch completed"
