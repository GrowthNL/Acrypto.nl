name: Prune Articles

# Handmatig te starten (Actions -> Prune Articles -> Run workflow).
# Zet de in scripts/prune-articles.ts benoemde artikelen op 'draft' (omkeerbaar).
on:
  workflow_dispatch:

jobs:
  prune:
    name: Artikelen offline halen
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prune articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL niet ingesteld - prune overgeslagen."
            exit 0
          fi
          npm run prune:articles
