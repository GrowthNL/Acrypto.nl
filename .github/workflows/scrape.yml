name: Crypto News Scraper

on:
  schedule:
    # 1x per dag om 06:00 UTC (08:00 NL). Bewuste keuze voor een nieuw domein:
    # kwaliteit boven kwantiteit, geen "scaled content"-patroon richting Google,
    # en minimale API-/Actions-kosten. Opschalen kan later als de autoriteit groeit.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Publish Articles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape & publish (direct naar database)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MAX_ARTICLES: '1'
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "DATABASE_URL of ANTHROPIC_API_KEY niet ingesteld - scrape overgeslagen."
            echo "Zet deze als GitHub secrets: Settings -> Secrets and variables -> Actions."
            exit 0
          fi
          npm run scrape:direct
