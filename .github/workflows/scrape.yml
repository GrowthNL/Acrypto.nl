name: Crypto News Scraper

on:
  schedule:
    # Elke 3 uur (GitHub kan dit throttlen; loopt in de praktijk een paar keer per dag)
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Publish Articles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape & publish (direct naar database)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MAX_ARTICLES: '3'
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "DATABASE_URL of ANTHROPIC_API_KEY niet ingesteld - scrape overgeslagen."
            echo "Zet deze als GitHub secrets: Settings -> Secrets and variables -> Actions."
            exit 0
          fi
          npm run scrape:direct
