name: Crypto News Scraper

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'

jobs:
  scrape:
    name: Scrape & Publish Articles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger scrape endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "SITE_URL or CRON_SECRET not configured : skipping scrape."
            echo "Set these secrets in GitHub → Settings → Secrets and variables → Actions."
            exit 0
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/scrape")

          echo "Response code: $RESPONSE"

          if [ "$RESPONSE" = "504" ]; then
            echo "Scrape timed out (504) - will retry on next schedule"
            exit 0
          fi

          if [ "$RESPONSE" != "200" ]; then
            echo "Scrape failed with status $RESPONSE"
            exit 1
          fi

          echo "Scrape completed successfully"
