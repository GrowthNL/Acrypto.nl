name: Crypto News Scraper

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: 'false'
  push:
    branches: [main]

jobs:
  scrape:
    name: Scrape & Publish Articles
    runs-on: ubuntu-latest
    # Only actually run on schedule or manual dispatch — not on push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "⚠️  SITE_URL or CRON_SECRET not configured — skipping scrape."
            echo "Set these secrets in GitHub → Settings → Secrets and variables → Actions."
            exit 0
          fi
          echo "Secrets configured, proceeding."

      - name: Trigger scrape endpoint
        if: ${{ secrets.SITE_URL != '' && secrets.CRON_SECRET != '' }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/scrape")

          echo "Response code: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Scrape failed with status $RESPONSE"
            exit 1
          fi

          echo "Scrape completed successfully"
